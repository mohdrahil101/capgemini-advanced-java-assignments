<html>
<head><title>Add Customer</title></head>
<body>
<h2>Add Customer</h2>
<form th:action="@{/saveCustomer}" th:object="${customer}" method="post">
	<input type="hidden" th:field="*{id}"/>
	<label>Name:</label>
	<input type="text" th:field="*{name}"/><br><br>
	<label>Email:</label>
	<input type="email" th:field="*{email}"/><br><br>
	<label>Phone:</label>
	<input type="tel" th:field="*{phone}"/><br><br>
	<label>Address:</label>
	<input type="text" th:field="*{address}"/><br><br>

	<button type="submit">Save Customer</button>
</form>
</body>
</html>
